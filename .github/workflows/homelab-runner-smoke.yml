name: Homelab runner smoke

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: [self-hosted, linux, x64, homelab, lab, sugarbuzzlabs]
    timeout-minutes: 10
    steps:
      - name: Host summary
        run: |
          hostname
          uname -a
          whoami
          free -h
          df -h /