<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="robots" content="noindex" />
    <title>Sugarbuzz Labs Forms</title>
  </head>
  <body>
    <form name="sugarbuzz-waitlist" method="POST" netlify data-netlify="true" netlify-honeypot="bot-field">
      <input type="hidden" name="form-name" value="sugarbuzz-waitlist" />
      <p hidden>
        <label>Do not fill this out: <input name="bot-field" /></label>
      </p>
      <label>
        Email
        <input type="email" name="email" />
      </label>
      <label>
        Apps
        <input name="apps" />
      </label>
      <button type="submit">Submit</button>
    </form>
  </body>
</html>
